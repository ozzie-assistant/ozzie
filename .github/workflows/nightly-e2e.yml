name: Nightly E2E

on:
  schedule:
    # Every night at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch: # Manual trigger

permissions:
  contents: read
  models: read

env:
  CARGO_TERM_COLOR: always

jobs:
  check-activity:
    runs-on: ubuntu-latest
    outputs:
      has_commits: ${{ steps.check.outputs.has_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for commits in the last 24h
        id: check
        run: |
          COMMITS=$(git log --oneline --since="24 hours ago" | wc -l)
          echo "commits_count=$COMMITS"
          if [ "$COMMITS" -gt 0 ]; then
            echo "has_commits=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_commits=false" >> "$GITHUB_OUTPUT"
          fi

  e2e:
    needs: check-activity
    if: needs.check-activity.outputs.has_commits == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Run E2E tests
        env:
          OPENAI_API_KEY: ${{ secrets.GITHUB_TOKEN }}
          OPENAI_BASE_URL: https://models.inference.ai.azure.com
          OPENAI_MODEL: gpt-4o-mini
          OPENAI_VISION_MODEL: gpt-4o-mini
        run: cargo test -p ozzie-cli --test e2e -- --test-threads=1
