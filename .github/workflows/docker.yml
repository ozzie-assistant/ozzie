name: Docker

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
    branches-ignore: []

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/dohr-michael/ozzie

jobs:
  docker:
    # Only run if the release workflow succeeded and was triggered by a tag
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'v') ||
      contains(github.event.workflow_run.head_branch, '.')
    strategy:
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: arm64
            platform: linux/arm64
    runs-on: ubuntu-latest
    name: docker (${{ matrix.arch }})

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Download release binary
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          # List release assets and find the linux binary archive
          if [[ "${{ matrix.arch }}" == "amd64" ]]; then
            TARGET="x86_64-unknown-linux-musl"
          else
            TARGET="aarch64-unknown-linux-musl"
          fi
          # Download the archive from the GitHub release
          gh release download "${TAG}" --pattern "*${TARGET}*" --dir dist/
          # Extract the binary
          ARCHIVE=$(ls dist/*.tar.* 2>/dev/null | head -1)
          if [ -z "$ARCHIVE" ]; then
            echo "No archive found for ${TARGET}, listing dist/:"
            ls -la dist/
            exit 1
          fi
          echo "Extracting: $ARCHIVE"
          mkdir -p extracted
          if [[ "$ARCHIVE" == *.tar.xz ]]; then
            tar xJf "$ARCHIVE" -C extracted/
          elif [[ "$ARCHIVE" == *.tar.gz ]]; then
            tar xzf "$ARCHIVE" -C extracted/
          fi
          BINARY=$(find extracted -name "ozzie" -type f | head -1)
          cp "$BINARY" ozzie-binary
          chmod +x ozzie-binary

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          build-args: BINARY=ozzie-binary
          tags: ${{ env.IMAGE }}:${{ steps.version.outputs.tag }}-${{ matrix.arch }}

  manifest:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Resolve version tag
        id: version
        run: |
          TAG="${{ github.event.workflow_run.head_branch }}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create multi-arch manifests
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          docker manifest create ${{ env.IMAGE }}:${TAG} \
            ${{ env.IMAGE }}:${TAG}-amd64 \
            ${{ env.IMAGE }}:${TAG}-arm64
          docker manifest push ${{ env.IMAGE }}:${TAG}

          docker manifest create ${{ env.IMAGE }}:latest \
            ${{ env.IMAGE }}:${TAG}-amd64 \
            ${{ env.IMAGE }}:${TAG}-arm64
          docker manifest push ${{ env.IMAGE }}:latest
